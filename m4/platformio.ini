[env]
board_build.mbed.ldscript = true
board_build.arduino.ldscript = $PROJECT_DIR/linker_script_reserved_sram3.ld
build_flags =
  -DDEVICE_USBDEVICE=1
  -DDAC_ADC_ENABLE_M4_MBED_USB_CDC
  -Wl,--wrap=_Z11get_usb_phyv

[env:giga_r1_m4_old_hardware]
platform = ststm32
board = giga_r1_m4
framework = arduino
debug_tool = stlink
upload_protocol = stlink

extra_scripts = pre:../tools/gen_compile_commands.py
  pre:../tools/inject_firmware_version.py
  pre:../tools/platformio_pre_upload.py
  pre:../tools/platformio_post_upload.py

debug_build_flags =
  -O0
  -g3

debug_init_break = tbreak main

build_flags =
  ${env.build_flags}
  -D__OLD_DAC_ADC__
  -D__OLD_SHIELD__


[env:giga_r1_m4_new_hardware]
platform = ststm32
board = giga_r1_m4
framework = arduino
debug_tool = stlink
upload_protocol = custom

