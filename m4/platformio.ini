[env]
board_build.mbed.ldscript = true
board_build.arduino.ldscript = $PROJECT_DIR/linker_script_reserved_sram3.ld
board_build.variant = ${PROJECT_DIR}/../platformio_variants/GENERIC_STM32H747_M4
build_flags =
  -DDEVICE_USBDEVICE=1
  -Wl,--wrap=_Z11get_usb_phyv

[env:gatekeeper_m4_usb_gateway]
platform = ststm32
board = giga_r1_m4
framework = arduino
debug_tool = stlink
upload_protocol = custom

extra_scripts = pre:../platformio_tools/gen_compile_commands.py
  pre:../platformio_tools/inject_firmware_version.py
  pre:../platformio_tools/platformio_usb_bundle_upload.py
  pre:../platformio_tools/platformio_pre_upload.py
  pre:../platformio_tools/platformio_post_upload.py

debug_build_flags =
  -O0
  -g3

debug_init_break = tbreak main

build_flags =
  ${env.build_flags}

[env:giga_r1_m4_old_hardware]
platform = ststm32
board = giga_r1_m4
framework = arduino
debug_tool = stlink
upload_protocol = stlink

extra_scripts = pre:../platformio_tools/gen_compile_commands.py
  pre:../platformio_tools/inject_firmware_version.py
  pre:../platformio_tools/platformio_pre_upload.py
  pre:../platformio_tools/platformio_post_upload.py

debug_build_flags =
  -O0
  -g3

debug_init_break = tbreak main

build_flags =
  ${env.build_flags}
  -D__OLD_DAC_ADC__
  -D__OLD_SHIELD__


